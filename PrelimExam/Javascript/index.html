<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Records Challenge</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #bbb; padding: 10px; text-align: left; }
        footer { margin-top: 40px; padding: 10px; border-top: 2px solid #333; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Student Record System</h1>
    
    <div>
        <input type="text" id="idIn" placeholder="ID">
        <input type="text" id="nameIn" placeholder="Full Name">
        <input type="text" id="gradeIn" placeholder="Grade">
        <button onclick="addEntry()">Add Entry</button>
    </div>

    <table id="recordTable">
        <thead>
            <tr><th>ID</th><th>Name</th><th>Grade</th><th>Action</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <footer>Programmer: Lanceta, Alexander D. | Student ID: 23-1269-840</footer>

    <script src="script.js"></script>
</body>
</html>
